<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fyra — Track your path to FIRE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #F2EDE3;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }
    .logo span {
      color: #f5c518;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 1rem;
    }
    .sub {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">fy<span>r</span>a</div>
    <h1>Track your path to financial independence.</h1>
    <a class="btn" href="https://apps.apple.com">Download on the App Store</a>
    <p class="sub">iOS · Free to start</p>
  </div>
</body>
</html>
